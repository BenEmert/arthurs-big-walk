<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arthur's Big Walk</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐕</text></svg>">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1c2530;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      /* logical 960x540 scaled to fit the viewport, aspect preserved (letterboxed by flex centering) */
      image-rendering: pixelated;
      touch-action: none;
    }
    /* Portrait rotate hint: the 16:9 game letterboxes to a thin strip in
       portrait, so on touch devices held upright we cover the screen and ask
       for landscape. game.js pauses the run while this is showing. */
    #rotate-hint { display: none; }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-hint {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 10;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #1c2530;
        color: #f0f4f8;
        font-family: monospace;
        text-align: center;
        padding: 24px;
      }
      #rotate-hint .glyph { font-size: 64px; }
      #rotate-hint p { margin: 0; font-size: 20px; line-height: 1.5; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="rotate-hint">
    <div class="glyph">📱↻</div>
    <p>Rotate your phone<br>Arthur walks in landscape</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
